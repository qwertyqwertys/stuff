<!DOCTYPE html>
<html>
<head>
    <title>Puppy Math | Loading...</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="game-frame" src=""></iframe>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gamePath = params.get('launch'); 

        if (gamePath) {
            document.getElementById('game-frame').src = gamePath;
        }
        // I removed the extra "}" that was here!
    </script>
</body>
</html>
